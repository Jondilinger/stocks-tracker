name: Daily Stock Update

on:
  schedule:
    # 22:00 UTC = 01:00 ώρα Ελλάδας (1 ώρα μετά το κλείσιμο αμερικανικής αγοράς)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:   # επιτρέπει και χειροκίνητο "Run workflow" από το GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run update script
        run: python github_update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.csv
          git diff --quiet --cached || git commit -m "Daily stock update"
          git push
