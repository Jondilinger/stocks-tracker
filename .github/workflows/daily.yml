name: Daily Stock Update

on:
  schedule:
    # 00:00 UTC = 03:00 ώρα Ελλάδας
    # Τρίτη-Σάββατο: καταγράφει Δευτέρα-Παρασκευή αντίστοιχα
    # (4 ώρες μετά το κλείσιμο US αγοράς - 100% σίγουρα ολοκληρωμένη η συνεδρίαση)
    - cron: '0 0 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run update script
        run: python github_update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.csv
          git diff --quiet --cached || (git commit -m "Daily stock update" && git pull --rebase && git push)
